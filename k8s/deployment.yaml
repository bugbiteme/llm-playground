apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-chat-client
  labels:
    app: llm-chat-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-chat-client
  template:
    metadata:
      labels:
        app: llm-chat-client
    spec:
      containers:
        - name: llm-chat-client
          image: llm-chat-client:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: llm-chat-client
  labels:
    app: llm-chat-client
spec:
  selector:
    app: llm-chat-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
