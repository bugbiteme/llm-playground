<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Chat Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <header>
    <div class="header-title">
      <h1>LLM Chat Client</h1>
      <p>Enter a custom LLM endpoint, headers, and model parameters to chat.</p>
    </div>
    <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">
      <span class="theme-icon-light">☀</span>
      <span class="theme-icon-dark">☽</span>
    </button>
  </header>

  <main>
    <section class="panel config-panel">
      <h2>LLM Configuration</h2>

      <label>
        Endpoint URL
        <input id="endpoint" type="url" placeholder="https://llm.demo.leonlevy.lol/v1/chat/completions" value="https://llm.demo.leonlevy.lol/v1/chat/completions" />
      </label>

      <div class="headers-section">
        <div class="section-header">
          <h3>Headers</h3>
          <button id="add-header" class="add-header-button" title="Add a new header">＋ Add Header</button>
        </div>
        <div id="headers"></div>
      </div>

      <div class="params-grid">
        <label>
          Model
          <input id="model" type="text" placeholder="deepseek-r1-distill-qwen-14b" value="deepseek-r1-distill-qwen-14b" />
        </label>
        <label>
          Max tokens
          <input id="max_tokens" type="number" min="1" value="50" />
        </label>
        <label>
          Temperature
          <input id="temperature" type="number" step="0.01" min="0" max="2" value="0.2" />
        </label>
        <label>
          Top P
          <input id="top_p" type="number" step="0.01" min="0" max="1" value="1" />
        </label>
        <label>
          n
          <input id="n" type="number" min="1" value="1" />
        </label>
        <label>
          Stop
          <input id="stop" type="text" placeholder="["\"\n\"]" />
        </label>
      </div>

      <label class="full-width">
        Extra JSON options
        <textarea id="extra-options" rows="5" placeholder='{"presence_penalty": 0.1, "frequency_penalty": 0.1}'></textarea>
      </label>

      <label class="stream-toggle">
        <input id="stream-mode" type="checkbox" />
        Enable streaming responses
      </label>

      <div class="button-row">
        <button id="clear-chat" class="secondary">Clear Chat</button>
      </div>
    </section>

    <section class="panel chat-panel">
      <div class="chat-header">
        <h2>Chat</h2>
      </div>
      <div id="chat-window" class="chat-window"></div>
      <div class="chat-input-row">
        <textarea id="chat-input" rows="3" placeholder="Ask your model a question..."></textarea>
        <button id="send-btn">Send</button>
      </div>
    </section>

    <section class="panel rlp-panel">
      <div class="rlp-header">
        <h2>Rate Limit Status</h2>
        <span id="rlp-status-indicator" class="rlp-indicator">●</span>
      </div>
      <div id="rlp-table-container">
        <p class="rlp-empty">No active rate limits</p>
      </div>
    </section>

    <section class="panel logs-panel">
      <h2>Raw Request</h2>
      <pre id="raw-request" class="log-box"></pre>
      <h2>Raw Response</h2>
      <pre id="raw-response" class="log-box"></pre>
    </section>
  </main>

  <footer>
    <a href="https://github.com/bugbiteme/llm-playground" target="_blank" rel="noopener noreferrer">
      <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Source on GitHub
    </a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
